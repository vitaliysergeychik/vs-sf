name: Workflow A

on:
  pull_request:
    branches:
      - main

jobs:
  convert-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Convert XML to JSON
        run: |
          mkdir -p json
          find force-app -name "*.xml" | while read xml; do
            json_file="json/$(basename "$xml" .xml).json"
            echo "Converting $xml -> $json_file"
            yq -o=json "$xml" > "$json_file"
          done

      - name: Delete old artifacts
        run: |
          echo "Deleting old artifacts named 'salesforce-json'..."
          artifacts=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/artifacts \
            | jq -r '.artifacts[] | select(.name=="salesforce-json") | .id')

          for artifact_id in $artifacts; do
            echo "Deleting artifact ID: $artifact_id"
            curl -s -X DELETE \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$artifact_id
          done

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: salesforce-json
          path: json
