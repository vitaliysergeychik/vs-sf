name: Convert Salesforce Metadata in force-app to JSON

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:
  convert-metadata:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install yq (official binary that includes XML parsing)
      - name: Install yq/xq
        run: |
          YQ_VERSION=v4.44.1
          sudo wget https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      # Confirm yq can parse XML and output JSON
      - name: Verify yq XML→JSON capability
        run: |
          echo "<root><test>ok</test></root>" | yq -p=xml -o=json

      # Convert all XML files under force-app to JSON
      - name: Convert XML metadata to JSON
        run: |
          mkdir -p json
          find force-app -name "*.xml" | while read xmlfile; do
            jsonfile="json/${xmlfile#force-app/}.json"
            mkdir -p "$(dirname "$jsonfile")"
            yq -p=xml -o=json < "$xmlfile" > "$jsonfile"
          done

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: salesforce-json
          path: json
