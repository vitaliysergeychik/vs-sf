name: CodeScan SCA on PR

on:
  workflow_dispatch:     # allows manual run
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codescan-sca:
    runs-on: ubuntu-latest
    environment: main     # <-- uses your 'main' environment + its secrets

    env:
      CODESCAN_URL: "https://app.codescan.io"
      CODESCAN_TOKEN: ${{ secrets.CODESCAN_TOKEN }}
      CODESCAN_PROJECT_KEY: ${{ secrets.CODESCAN_PROJECT_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch SCA issues from CodeScan
        id: sca
        run: |
          PR="${{ github.event.pull_request.number }}"

          RESPONSE=$(curl -s -u "$CODESCAN_TOKEN:" \
            "$CODESCAN_URL/api/issues/search?projectKeys=$CODESCAN_PROJECT_KEY&pullRequest=$PR&types=VULNERABILITY")

          critical=$(echo "$RESPONSE" | jq '[.issues[] | select(.severity=="CRITICAL")] | length')
          high=$(echo "$RESPONSE"     | jq '[.issues[] | select(.severity=="MAJOR")]   | length')
          medium=$(echo "$RESPONSE"   | jq '[.issues[] | select(.severity=="MINOR")]   | length')
          low=$(echo "$RESPONSE"      | jq '[.issues[] | select(.severity=="INFO")]    | length')

          echo "critical=$critical" >> $GITHUB_OUTPUT
          echo "high=$high"         >> $GITHUB_OUTPUT
          echo "medium=$medium"     >> $GITHUB_OUTPUT
          echo "low=$low"           >> $GITHUB_OUTPUT

      - name: Fetch quality gate status
        id: qg
        run: |
          PR="${{ github.event.pull_request.number }}"

          QG=$(curl -s -u "$CODESCAN_TOKEN:" \
            "$CODESCAN_URL/api/qualitygates/project_status?projectKey=$CODESCAN_PROJECT_KEY&pullRequest=$PR")

