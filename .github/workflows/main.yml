name: ARM Trigger Test

on:
  workflow_dispatch:
    inputs:
      armRunId:
        description: "Optional ARM run ID"
        required: false
        type: string

jobs:
  run-test:
    runs-on: ubuntu-latest
    steps:
      - name: Print success message
        run: |
          echo "GitHub Actions workflow triggered successfully."
          echo "ARM Run ID: ${{ github.event.inputs.armRunId }}"
