name: CodeScan SCA Report for All Open PRs

on:
  workflow_dispatch:
    inputs:
      projectName:
        required: false
        type: string
      buildNumber:
        required: false
        type: string
      sforgName:
        required: false
        type: string
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan-all-prs:
    runs-on: ubuntu-latest
    environment: main

    env:
      CODESCAN_URL: "https://app.codescan.io"
      CODESCAN_TOKEN: ${{ secrets.CODESCAN_TOKEN }}
      CODESCAN_PROJECT_KEY: ${{ secrets.CODESCAN_PROJECT_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print ARM metadata
        run: |
          echo "=== ARM Metadata ==="
          echo "Project Name: ${{ github.event.inputs.projectName }}"
          echo "Build Number: ${{ github.event.inputs.buildNumber }}"
          echo "Salesforce Org: ${{ github.event.inputs.sforgName }}"
          echo "===================="

      - name: Get all open PR numbers
        id: prs
        run: |
          PR_LIST=$(gh pr list \
            --repo ${{ github.repository }} \
            --state open \
            --json number \
            --jq '.[].number')

          echo "pr_list<<EOF" >> $GITHUB_OUTPUT
          echo "$PR_LIST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Process each PR
        run: |
          while read -r PR; do
            [ -z "$PR" ] && continue

            echo "Checking CodeScan results for PR #$PR"

            API_URL="$CODESCAN_URL/api/issues/search?componentKeys=$CODESCAN_PROJECT_KEY&pullRequest=$PR"
            RESPONSE=$(curl -s -u "$CODESCAN_TOKEN:" "$API_URL")

            ISSUE_COUNT=$(echo "$RESPONSE" | jq '.issues | length')

            if [ "$ISSUE_COUNT" -eq 0 ]; then
              echo "No SCA issues found for PR #$PR â€” skipping."
              continue
            fi

            echo "SCA issues found for PR #$PR â€” generating table."

            # Extract counts
            CRITICAL=$(echo "$RESPONSE" | jq '[.issues[] | select(.severity=="CRITICAL")] | length')
            MAJOR=$(echo "$RESPONSE" | jq '[.issues[] | select(.severity=="MAJOR")] | length')
            MINOR=$(echo "$RESPONSE" | jq '[.issues[] | select(.severity=="MINOR")] | length')
            INFO=$(echo "$RESPONSE" | jq '[.issues[] | select(.severity=="INFO")] | length')

            # Build table
            printf "| File | Line | Issue | Severity |\n" > issue_table.md
            printf "|------|------|--------|----------|\n" >> issue_table.md

            echo "$RESPONSE" | jq -r '
              .issues[] |
              "| \(.component | split(":")[-1] | split("/")[-1]) | \(.textRange.startLine // "N/A") | \(.message) | \(.severity) |"
            ' >> issue_table.md

            # Build comment using printf (NO HEREDOCS)
            {
              printf "### đź”Ť CodeScan SCA Summary for PR #%s\n\n" "$PR"
              printf "**Critical:** %s  \n" "$CRITICAL"
              printf "**Major:** %s  \n" "$MAJOR"
              printf "**Minor:** %s  \n" "$MINOR"
              printf "**Info:** %s  \n\n" "$INFO"

              printf "---\n\n### đź“„ Issue Details\n"
              cat issue_table.md
              printf "\n---\n\n"

              printf "### đź§© ARM Metadata\n"
              printf "**Project Name:** %s  \n" "${{ github.event.inputs.projectName }}"
              printf "**Build Number:** %s  \n" "${{ github.event.inputs.buildNumber }}"
              printf "**Salesforce Org:** %s  \n\n" "${{ github.event.inputs.sforgName }}"

              printf "_This report was generated automatically by GitHub Actions._\n"
            } > comment.md

            echo "Posting comment to PR #$PR"

            gh pr comment "$PR" \
              --repo ${{ github.repository }} \
              --body-file comment.md

          done <<< "${{ steps.prs.outputs.pr_list }}"

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
