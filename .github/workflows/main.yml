name: CodeScan SCA Report for All Open PRs

on:
  workflow_dispatch:
    inputs:
      projectName:
        required: false
        type: string
      buildNumber:
        required: false
        type: string
      sforgName:
        required: false
        type: string
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  scan-all-prs:
    runs-on: ubuntu-latest
    environment: main

    env:
      CODESCAN_URL: "https://app.codescan.io"
      CODESCAN_TOKEN: ${{ secrets.CODESCAN_TOKEN }}
      CODESCAN_PROJECT_KEY: ${{ secrets.CODESCAN_PROJECT_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print ARM metadata
        run: |
          echo "=== ARM Metadata ==="
          echo "Project Name: ${{ github.event.inputs.projectName }}"
          echo "Build Number: ${{ github.event.inputs.buildNumber }}"
          echo "Salesforce Org: ${{ github.event.inputs.sforgName }}"
          echo "===================="

      - name: Get all open PR numbers
        id: prs
        run: |
          PR_LIST=$(gh pr list \
            --repo ${{ github.repository }} \
            --state open \
            --json number \
            --jq '.[].number')

          echo "pr_list<<EOF" >> $GITHUB_OUTPUT
          echo "$PR_LIST" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Process each PR
        run: |
          while read -r PR; do
            [ -z "$PR" ] && continue

            echo "Checking CodeScan results for PR #$PR"

            API_URL="$CODESCAN_URL/api/issues/search?componentKeys=$CODESCAN_PROJECT_KEY&pullRequest=$PR"
            RESPONSE=$(curl -s -u "$CODESCAN_TOKEN:" "$API_URL")

            ISSUE_COUNT=$(echo "$RESPONSE" | jq '.issues | length')

            if [ "$ISSUE_COUNT" -eq 0 ]; then
              echo "No SCA issues found for PR #$PR — skipping."
              continue
            fi

            echo "SCA issues found for PR #$PR — generating table."

            # Extract counts
            CRITICAL=$(echo "$RESPONSE" | jq '[.issues[] | select(.severity=="CRITICAL")] | length')
            MAJOR=$(echo "$RESPONSE" | jq '[.issues[] | select(.severity=="MAJOR")] | length')
            MINOR=$(echo "$RESPONSE" | jq '[.issues[] | select(.severity=="MINOR")] | length')
            INFO=$(echo "$RESPONSE" | jq '[.issues[] | select(.severity=="INFO")] | length')

            # Build table
            printf "%s\n" "| File | Line | Issue | Severity |" > issue_table.md
            printf "%s\n" "|------|------|--------|----------|" >> issue_table.md

            echo "$RESPONSE" | jq -r '
              .issues[] |
              "| \(.component | split(":")[-1] | split("/")[-1]) | \(.textRange.startLine // "N/A") | \(.message | gsub("\n"; " ")) | \(.severity) |"
            ' >> issue_table.md

            # Build comment with PR-specific marker
            {
              printf "%s\n" "<!-- codescan-sca-report PR=$PR -->"
              printf "%s\n\n" "### 🔍 CodeScan SCA Summary for PR #$PR"

              printf "%s\n" "**Critical:** $CRITICAL  "
              printf "%s\n" "**Major:** $MAJOR  "
              printf "%s\n" "**Minor:** $MINOR  "
              printf "%s\n\n" "**Info:** $INFO  "

              printf "%s\n" "---"
              printf "%s\n\n" "### 📄 Issue Details"
              cat issue_table.md
              printf "\n%s\n\n" "---"

              printf "%s\n" "### 🧩 ARM Metadata"
              printf "%s\n" "**Project Name:** ${{ github.event.inputs.projectName }}  "
              printf "%s\n" "**Build Number:** ${{ github.event.inputs.buildNumber }}  "
              printf "%s\n\n" "**Salesforce Org:** ${{ github.event.inputs.sforgName }}  "

              printf "%s\n" "_This report was generated automatically by GitHub Actions._"
            } > comment.md

            echo "Checking for existing comment on PR #$PR"

            # Fetch last comment for THIS PR from THIS workflow
            gh pr comment list "$PR" \
              --repo ${{ github.repository }} \
              --json body \
              --jq ".[] | select(.body | contains(\"codescan-sca-report PR=$PR\")) | .body" \
              | head -n 1 > last_comment.md

            if [ -s last_comment.md ]; then
              echo "Existing comment found — comparing…"

              if cmp -s comment.md last_comment.md; then
                echo "No changes since last comment — skipping."
                continue
              else
                echo "Changes detected — posting updated comment."
              fi
            else
              echo "No previous comment found — posting new comment."
            fi

            gh pr comment "$PR" \
              --repo ${{ github.repository }} \
              --body-file comment.md

          done <<< "${{ steps.prs.outputs.pr_list }}"

        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
