name: CodeScan SCA on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codescan-sca:
    runs-on: ubuntu-latest

    env:
      CODESCAN_URL: "https://app.codescan.io"
      CODESCAN_TOKEN: ${{ secrets.CODESCAN_TOKEN }}
      CODESCAN_PROJECT_KEY: ${{ secrets.CODESCAN_PROJECT_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch SCA issues from CodeScan
        id: sca
        run: |
          PR="${{ github.event.pull_request.number }}"

          RESPONSE=$(curl -s -u "$CODESCAN_TOKEN:" \
            "$CODESCAN_URL/api/issues/search?projectKeys=$CODESCAN_PROJECT_KEY&pullRequest=$PR&types=VULNERABILITY")

          critical=$(echo "$RESPONSE" | jq '[.issues[] | select(.severity=="CRITICAL")] | length')
          high=$(echo "$RESPONSE"     | jq '[.issues[] | select(.severity=="MAJOR")]   | length')
          medium=$(echo "$RESPONSE"   | jq '[.issues[] | select(.severity=="MINOR")]   | length')
          low=$(echo "$RESPONSE"      | jq '[.issues[] | select(.severity=="INFO")]    | length')

          echo "critical=$critical" >> $GITHUB_OUTPUT
          echo "high=$high"         >> $GITHUB_OUTPUT
          echo "medium=$medium"     >> $GITHUB_OUTPUT
          echo "low=$low"           >> $GITHUB_OUTPUT

      - name: Fetch quality gate status
        id: qg
        run: |
          PR="${{ github.event.pull_request.number }}"

          QG=$(curl -s -u "$CODESCAN_TOKEN:" \
            "$CODESCAN_URL/api/qualitygates/project_status?projectKey=$CODESCAN_PROJECT_KEY&pullRequest=$PR")

          quality=$(echo "$QG" | jq -r '.projectStatus.status')
          echo "quality=$quality" >> $GITHUB_OUTPUT

      - name: Comment SCA results on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const critical = Number("${{ steps.sca.outputs.critical }}");
            const high     = Number("${{ steps.sca.outputs.high }}");
            const medium   = Number("${{ steps.sca.outputs.medium }}");
            const low      = Number("${{ steps.sca.outputs.low }}");
            const quality  = "${{ steps.qg.outputs.quality }}";

            const body = [
              "### 🔍 CodeScan SCA Results",
              "",
              `**Quality Gate:** ${quality}`,
              "",
              "#### Vulnerabilities",
              `- 🔴 Critical: ${critical}`,
              `- 🟠 High: ${high}`,
              `- 🟡 Medium: ${medium}`,
              `- 🟢 Low: ${low}`
            ].join("\n");

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail on Critical/High vulnerabilities
        run: |
          if [ ${{ steps.sca.outputs.critical }} -gt 0 ] || [ ${{ steps.sca.outputs.high }} -gt 0 ]; then
            echo "Critical/High vulnerabilities found. Failing the check."
            exit 1
          fi
