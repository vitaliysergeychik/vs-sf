name: Guard Agentic Code Analysis
# should be new verison of yaml
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  guard-review:
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed so --pr can diff against the base branch

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Download Guard CLI plugin
        run: |
          curl -fsSL -H "X-API-Key: ${GUARD_API_KEY}" \
            -o /tmp/sf-guard-cli.tgz \
            "${GUARD_URL}/cli/sf-guard-cli.tgz"
        env:
          GUARD_API_KEY: ${{ secrets.GUARD_API_KEY }}
          GUARD_URL: ${{ secrets.GUARD_URL }}

      - name: Install Guard CLI plugin
        run: echo y | sf plugins install file:///tmp/sf-guard-cli.tgz

      - name: Run Agentic Code Review
        id: guard_review
        run: |
          set +e
          sf guard review --api-key "${GUARD_API_KEY}" --pr --html \
            --url "${GUARD_URL}" --endpoint "${GUARD_ENDPOINT}" \
            "${GITHUB_WORKSPACE}" 
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

          # --html writes a timestamped report under .guard/reports/*.html.
          # Grab the most recently written one so the comment step knows
          # exactly which file to parse.
          html_report=$(ls -t .guard/reports/*.html 2>/dev/null | head -n1 || true)
          echo "html_report=${html_report}" >> "$GITHUB_OUTPUT"
        env:
          GUARD_API_KEY: ${{ secrets.GUARD_API_KEY }}
          GUARD_URL: ${{ secrets.GUARD_URL }}
          GUARD_ENDPOINT: ${{ secrets.GUARD_ENDPOINT }}

      - name: Comment findings on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '### 🛡️ Guard Agentic Code Review';

            // The --html report has a stable, self-describing schema: every
            // finding is a `<tr data-severity="…" data-category="…"
            // data-file="…" data-line="…" data-rule="…" data-reason="…"
            // data-recommendation="…">` row inside #findings-table. That's
            // far more reliable than guessing at guard-result.json's field
            // names, so this step reads the HTML report instead.
            const htmlPath = ${{ toJSON(steps.guard_review.outputs.html_report) }};

            function unescapeHtml(value) {
              return String(value)
                .replace(/&lt;/g, '<')
                .replace(/&gt;/g, '>')
                .replace(/&quot;/g, '"')
                .replace(/&#39;/g, "'")
                .replace(/&amp;/g, '&');
            }

            function extractFindings(html) {
              const findings = [];
              const rowRe = /<tr\s+data-severity="[^"]*"[\s\S]*?<\/tr>/g;
              const attr = (rowHtml, name) => {
                const m = rowHtml.match(new RegExp(`data-${name}="([^"]*)"`));
                return m ? unescapeHtml(m[1]) : '';
              };
              let match;
              while ((match = rowRe.exec(html)) !== null) {
                const row = match[0];
                findings.push({
                  severity: attr(row, 'severity'),
                  category: attr(row, 'category'),
                  file: attr(row, 'file'),
                  line: attr(row, 'line'),
                  rule: attr(row, 'rule'),
                  reason: attr(row, 'reason'),
                  recommendation: attr(row, 'recommendation'),
                });
              }
              return findings;
            }

            let body;
            try {
              if (!htmlPath || !fs.existsSync(htmlPath)) {
                throw new Error(`no HTML report found (looked for path: ${htmlPath || '.guard/reports/*.html'})`);
              }

              const html = fs.readFileSync(htmlPath, 'utf8');
              const findings = extractFindings(html);

              const severityOrder = ['BLOCKER', 'CRITICAL', 'MAJOR', 'MINOR', 'INFO'];
              const counts = severityOrder.reduce((acc, s) => ({ ...acc, [s]: 0 }), {});
              for (const f of findings) {
                if (counts[f.severity] !== undefined) counts[f.severity]++;
              }
              const summaryLine = severityOrder
                .map((s) => `${counts[s]} ${s.toLowerCase()}`)
                .join(' · ');

              body = `${marker}\n\n`;
              if (findings.length === 0) {
                body += 'No issues found.';
              } else {
                findings.sort((a, b) => severityOrder.indexOf(a.severity) - severityOrder.indexOf(b.severity));
                body += `Found **${findings.length}** issue(s) — ${summaryLine}\n\n`;
                body += '| Severity | Category | Rule | File | Line | Reason | Recommendation |\n';
                body += '|---|---|---|---|---|---|---|\n';
                for (const f of findings) {
                  const esc = (s) => String(s ?? '').replace(/\|/g, '\\|').replace(/\r?\n/g, ' ');
                  body += `| ${esc(f.severity)} | ${esc(f.category)} | \`${esc(f.rule)}\` | \`${esc(f.file)}\` | ${esc(f.line)} | ${esc(f.reason)} | ${esc(f.recommendation)} |\n`;
                }
              }
            } catch (e) {
              body = `${marker}\n\nCould not parse Guard HTML report: ${e.message}`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guard-report
          path: .guard/reports/*.html
          if-no-files-found: ignore

      - name: Fail job if Guard found blocking issues
        if: always()
        run: exit ${{ steps.guard_review.outputs.exit_code }}