name: Guard Agentic Code Analysis
# should be new verison of yaml
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  guard-review:
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed so --pr can diff against the base branch

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Download Guard CLI plugin
        run: |
          curl -fsSL -H "X-API-Key: ${GUARD_API_KEY}" \
            -o /tmp/sf-guard-cli.tgz \
            "${GUARD_URL}/cli/sf-guard-cli.tgz"
        env:
          GUARD_API_KEY: ${{ secrets.GUARD_API_KEY }}
          GUARD_URL: ${{ secrets.GUARD_URL }}

      - name: Install Guard CLI plugin
        run: echo y | sf plugins install file:///tmp/sf-guard-cli.tgz

      - name: Run Agentic Code Review
        id: guard_review
        run: |
          set +e
          sf guard review --api-key "${GUARD_API_KEY}" --pr --html --json \
            --url "${GUARD_URL}" --endpoint "${GUARD_ENDPOINT}" \
            "${GITHUB_WORKSPACE}" > guard-result.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        env:
          GUARD_API_KEY: ${{ secrets.GUARD_API_KEY }}
          GUARD_URL: ${{ secrets.GUARD_URL }}
          GUARD_ENDPOINT: ${{ secrets.GUARD_ENDPOINT }}

      - name: Comment findings on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '### 🛡️ Guard Agentic Code Review';

            let body;
            try {
              const raw = fs.readFileSync('guard-result.json', 'utf8');
              const result = JSON.parse(raw);

              // NOTE: the full GuardReviewResult schema isn't documented publicly —
              // these accessors are best-effort guesses (file/line/rule id/severity
              // are the fields the docs confirm exist). Inspect a real guard-result.json
              // from a run and adjust the property names below if they don't match.
              const findings = result.findings || result.issues || result.result?.findings || [];

              body = `${marker}\n\n`;
              if (findings.length === 0) {
                body += 'No issues found.';
              } else {
                body += `Found **${findings.length}** issue(s):\n\n`;
                body += '| Severity | File | Line | Rule | Message |\n';
                body += '|---|---|---|---|---|\n';
                for (const f of findings) {
                  const severity = f.severity ?? 'n/a';
                  const file = f.file ?? f.path ?? 'n/a';
                  const line = f.line ?? f.lineNumber ?? 'n/a';
                  const rule = f.ruleId ?? f.rule ?? 'n/a';
                  const message = String(f.message ?? f.description ?? '').replace(/\|/g, '\\|');
                  body += `| ${severity} | ${file} | ${line} | ${rule} | ${message} |\n`;
                }
              }
            } catch (e) {
              body = `${marker}\n\nCould not parse guard-result.json: ${e.message}`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guard-report
          path: .guard/reports/*.html
          if-no-files-found: ignore

      - name: Fail job if Guard found blocking issues
        if: always()
        run: exit ${{ steps.guard_review.outputs.exit_code }}