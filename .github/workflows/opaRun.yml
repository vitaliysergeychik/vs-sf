name: Workflow B

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-opa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List artifacts via API (debug)
        run: |
          echo "Listing artifacts via GitHub API..."
          curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/artifacts \
            | jq '.artifacts[] | {name: .name, expired: .expired, size_in_bytes: .size_in_bytes}'

      - name: Download JSON artifact
        uses: actions/download-artifact@v4
        with:
          name: salesforce-json
          path: json

      - name: Ensure JSON exists
        run: |
          if [ ! -d "json" ]; then
            echo "No JSON artifact found. Run Workflow A first."
            exit 1
          fi

      - name: Evaluate OPA Policies
        run: |
          echo "Running OPA..."
          for file in $(find json -name "*.json"); do
            echo "Evaluating $file"
            opa eval --format pretty \
              --input "$file" \
              --data policies \
              "data"
          done
