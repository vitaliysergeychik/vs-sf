name: Workflow B - OPA Evaluation

on:
  workflow_run:
    workflows: ["Workflow A"]
    types:
      - completed

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  opa-eval:
    runs-on: ubuntu-latest

    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact from Workflow A run
        run: |
          echo "Downloading artifact from Workflow A run ID: ${{ github.event.workflow_run.id }}"

          artifacts=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts")

          artifact_id=$(echo "$artifacts" | jq -r '.artifacts | map(select(.name=="salesforce-json")) | first.id')

          if [ "$artifact_id" = "null" ] || [ -z "$artifact_id" ]; then
            echo "No salesforce-json artifact found for this run."
            exit 1
          fi

          echo "Found artifact ID: $artifact_id"

          curl -L -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -o artifact.zip \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$artifact_id/zip"

          mkdir -p json
          unzip -q artifact.zip -d json
          echo "Extracted artifact:"
          ls -R json

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Evaluate OPA Policies (Permission Sets Only)
        run: |
          echo "Running OPA on permission sets only..."
          mkdir -p opa-results

          files=$(find json -type f -name "*permissionset-meta.json")

          if [ -z "$files" ]; then
            echo "No permission set metadata found."
            exit 0
          fi

          for file in $files; do
            echo "Evaluating $file"
