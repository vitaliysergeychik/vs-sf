name: Workflow B - OPA Evaluation

on:
  pull_request:
    branches:
      - main
  workflow_run:
    workflows: ["Workflow A"]
    types:
      - completed

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  opa-eval:
    runs-on: ubuntu-latest

    env:
      PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}

    steps:
      # ------------------------------------------------------------
      # Prevent double-runs: if triggered directly by PR, exit early
      # ------------------------------------------------------------
      - name: Skip direct PR trigger
        if: github.event_name == 'pull_request'
        run: |
          echo "Workflow B triggered directly by PR — waiting for Workflow A."
          exit 0

      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Download artifact from Workflow A
      # ------------------------------------------------------------
      - name: Download artifact from Workflow A run
        run: |
          echo "Downloading artifact from Workflow A run ID: ${{ github.event.workflow_run.id }}"

          artifacts=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts")

          artifact_id=$(echo "$artifacts" | jq -r '.artifacts | map(select(.name=="salesforce-json")) | first.id')

          if [ "$artifact_id" = "null" ] || [ -z "$artifact_id" ]; then
            echo "No salesforce-json artifact found for this run."
            exit 1
          fi

          echo "Found artifact ID: $artifact_id"

          curl -L -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -o artifact.zip \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$artifact_id/zip"

          mkdir -p json
          unzip -q artifact.zip -d json
          echo "Extracted artifact:"
          ls -R json

      # ------------------------------------------------------------
      # Install OPA
      # ------------------------------------------------------------
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          sudo mv opa /usr/local/bin/

      # ------------------------------------------------------------
      # Evaluate OPA policies
      # ------------------------------------------------------------
      - name: Evaluate OPA Policies (Permission Sets Only)
        run: |
          echo "Running OPA on permission sets only..."
          mkdir -p opa-results

          files=$(find json -type f -name "*permissionset-meta.json")

          if [ -z "$files" ]; then
            echo "No permission set metadata found."
            exit 0
          fi

          echo "[" > opa-results/results.json
          first=true

          for file in $files; do
            echo "Evaluating $file"

            result=$(opa eval --format=json \
              --input "$file" \
              --data OPApolicies \
              "data.salesforce.security")

            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> opa-results/results.json
            fi

            echo "$result" >> opa-results/results.json
          done

          echo "]" >> opa-results/results.json

      # ------------------------------------------------------------
      # Parse OPA results
      # ------------------------------------------------------------
      - name: Parse OPA Results
        id: parse
        run: |
          echo "Parsing OPA results..."

          if [ ! -f opa-results/results.json ]; then
            echo "no_violations=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          denies=$(jq '[.. | .deny? // empty] | add | unique' opa-results/results.json)
          warns=$(jq '[.. | .warn? // empty] | add | unique' opa-results/results.json)

          {
            echo "denies<<EOF"
            echo "$denies"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          {
            echo "warns<<EOF"
            echo "$warns"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          if [ "$denies" != "null" ] && [ "$denies" != "[]" ]; then
            echo "no_violations=false" >> $GITHUB_OUTPUT
          else
            echo "no_violations=true" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------------------------
      # Comment on PR
      # ------------------------------------------------------------
      - name: Comment on PR with OPA results
        if: env.PR_NUMBER != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pr = process.env.PR_NUMBER;

            const denies = JSON.parse(String.raw`${{ steps.parse.outputs.denies }}`);
            const warns = JSON.parse(String.raw`${{ steps.parse.outputs.warns }}`);

            let body = "### 🔍 OPA Policy Evaluation Results\n";

            if (Array.isArray(denies) && denies.length > 0) {
              body += "#### ❌ Violations Found\n";
              denies.forEach(v => body += `- ${v}\n`);
            } else {
              body += "#### ✅ No Deny Violations Found\n";
            }

            if (Array.isArray(warns) && warns.length > 0) {
              body += "\n#### ⚠️ Warnings\n";
              warns.forEach(v => body += `- ${v}\n`);
            }

            github.rest.issues.createComment({
              issue_number: pr,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # ------------------------------------------------------------
      # Fail PR if deny violations exist
      # ------------------------------------------------------------
      - name: Fail if deny violations exist
        if: steps.parse.outputs.no_violations == 'false'
        run: |
          echo "Deny violations detected. Failing workflow."
          exit 1
