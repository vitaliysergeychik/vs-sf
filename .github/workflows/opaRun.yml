name: Workflow B

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  run-opa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download latest salesforce-json artifact via API
        run: |
          echo "Finding latest 'salesforce-json' artifact..."
          artifact=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/artifacts \
            | jq -r '.artifacts
              | map(select(.name=="salesforce-json" and .expired==false))
              | sort_by(.created_at)
              | last')

          if [ "$artifact" = "null" ] || [ -z "$artifact" ]; then
            echo "No active 'salesforce-json' artifact found. Run Workflow A first."
            exit 1
          fi

          artifact_id=$(echo "$artifact" | jq -r '.id')
          echo "Downloading artifact ID: $artifact_id"

          curl -L -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$artifact_id/zip \
            -o artifact.zip

          mkdir -p json
          unzip -q artifact.zip -d json
          echo "Downloaded and extracted artifact:"
          ls -R json

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: Ensure JSON exists
        run: |
          if [ ! -d "json" ]; then
            echo "No JSON directory after download."
            exit 1
          fi
          if ! find json -name "*.json" | grep -q .; then
            echo "No JSON files found in json/."
            exit 1
          fi

      - name: Evaluate OPA Policies
        run: |
          echo "Running OPA..."
          for file in $(find json -name "*.json"); do
            echo "Evaluating $file"
            opa eval --format pretty \
