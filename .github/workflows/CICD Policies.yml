name: Salesforce Security Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # STEP 1 — Extract Salesforce metadata (former Workflow A)
      # ------------------------------------------------------------
      - name: Extract Salesforce Metadata
        run: |
          echo "Extracting Salesforce metadata..."
          mkdir -p json

          # Your extraction logic here
          # Example:
          # sf sobject metadata retrieve ...
          # unzip into json/

          echo "Metadata extraction complete."

      # ------------------------------------------------------------
      # STEP 2 — Install OPA
      # ------------------------------------------------------------
      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa
          sudo mv opa /usr/local/bin/

      # ------------------------------------------------------------
      # STEP 3 — Evaluate OPA policies (former Workflow B)
      # ------------------------------------------------------------
      - name: Evaluate OPA Policies
        run: |
          echo "Running OPA on permission sets..."
          mkdir -p opa-results

          files=$(find json -type f -name "*permissionset-meta.json")

          if [ -z "$files" ]; then
            echo "No permission set metadata found."
            echo "[]" > opa-results/results.json
            exit 0
          fi

          echo "[" > opa-results/results.json
          first=true

          for file in $files; do
            echo "Evaluating $file"

            result=$(opa eval --format=json \
              --input "$file" \
              --data OPApolicies \
              "data.salesforce.security")

            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> opa-results/results.json
            fi

            echo "$result" >> opa-results/results.json
          done

          echo "]" >> opa-results/results.json

      # ------------------------------------------------------------
      # STEP 4 — Parse OPA results
      # ------------------------------------------------------------
      - name: Parse OPA Results
        id: parse
        run: |
          echo "Parsing OPA results..."

          denies=$(jq '[.. | .deny? // empty] | add | unique' opa-results/results.json)
          warns=$(jq '[.. | .warn? // empty] | add | unique' opa-results/results.json)

          {
            echo "denies<<EOF"
            echo "$denies"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          {
            echo "warns<<EOF"
            echo "$warns"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # ------------------------------------------------------------
      # STEP 5 — Comment on PR
      # ------------------------------------------------------------
      - name: Comment on PR with OPA results
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;

            const denies = JSON.parse(String.raw`${{ steps.parse.outputs.denies }}`);
            const warns = JSON.parse(String.raw`${{ steps.parse.outputs.warns }}`);

            let body = "### 🔍 OPA Policy Evaluation Results\n";

            if (Array.isArray(denies) && denies.length > 0) {
              body += "#### ❌ Violations Found\n";
              denies.forEach(v => body += `- ${v}\n`);
            } else {
              body += "#### ✅ No Deny Violations Found\n";
            }

            if (Array.isArray(warns) && warns.length > 0) {
              body += "\n#### ⚠️ Warnings\n";
              warns.forEach(v => body += `- ${v}\n`);
            }

            github.rest.issues.createComment({
              issue_number: pr,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # ------------------------------------------------------------
      # STEP 6 — Always succeed
      # ------------------------------------------------------------
      - name: Complete Successfully
        run: echo "Security check completed successfully."
