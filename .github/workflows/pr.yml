name: CodeScan SCA Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SONAR_SCANNER_VERSION: 5.0.1.3006

jobs:
  build:
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------------
      # FIX: Ensure full git history (prevents "bad object <sha>")
      # -------------------------------------------------------
      - name: Ensure full git history
        run: |
          git fetch --unshallow || true
          git fetch --all --tags

      - name: Cache files
        uses: actions/cache@v4
        with:
          path: |
            ~/.sonar
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # -------------------------------------------------------
      # FULL SCAN ON PUSH
      # -------------------------------------------------------
      - name: Run CodeScan on Push
        if: github.event_name == 'push'
        uses: codescan-io/codescan-scanner-action@2.0
        with:
          organization: ${{ secrets.CODESCAN_ORG }}
          projectKey:   ${{ secrets.CODESCAN_PROJECT_KEY }}
          codeScanUrl:  ${{ secrets.CODESCAN_URL }}
          login:        ${{ secrets.CODESCAN_TOKEN }}
          generateSarifFile: true
          failOnRedQualityGate: false

      # -------------------------------------------------------
      # PR SCAN (CHANGED FILES ONLY)
      # -------------------------------------------------------
      - name: Run CodeScan on PR
        if: github.event_name == 'pull_request'
        uses: codescan-io/codescan-scanner-action@2.0
        with:
          organization: ${{ secrets.CODESCAN_ORG }}
          projectKey:   ${{ secrets.CODESCAN_PROJECT_KEY }}
          codeScanUrl:  ${{ secrets.CODESCAN_URL }}
          login:        ${{ secrets.CODESCAN_TOKEN }}
          scanChangedFilesOnly: true
          generateSarifFile: true
          failOnRedQualityGate: false
          args: |
            sonar.pullrequest.branch=${{ github.head_ref }}
            sonar.pullrequest.base=${{ github.base_ref }}
            sonar.pullrequest.key=${{ github.event.number }}

      # -------------------------------------------------------
      # Upload SARIF to GitHub Security Tab
      # -------------------------------------------------------
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: codescan.sarif

      # -------------------------------------------------------
      # PR COMMENT SUMMARY (FILE + LINE + SEVERITY + MESSAGE)
      # -------------------------------------------------------
      - name: Comment on PR with CodeScan Summary
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          echo "Parsing SARIF..."

          # Correct CodeScan severity mapping
          CRITICAL=$(jq '[.runs[].results[] | select(.level=="CRITICAL")] | length' codescan.sarif)
          HIGH=$(jq '[.runs[].results[] | select(.level=="MAJOR")] | length' codescan.sarif)
          MEDIUM=$(jq '[.runs[].results[] | select(.level=="MINOR")] | length' codescan.sarif)
          LOW=$(jq '[.runs[].results[] | select(.level=="INFO")] | length' codescan.sarif)

          # Build markdown table (FILE | LINE | SEVERITY | MESSAGE)
          TABLE=$(jq -r '
            .runs[].results[] |
            {
              file: .locations[0].physicalLocation.artifactLocation.uri,
              line: .locations[0].physicalLocation.region.startLine,
              level: .level,
              msg: (.message.text | gsub("\n"; " "))
            } |
            "| \(.file) | \(.line) | \(.level) | \(.msg) |"
          ' codescan.sarif)

          COMMENT=$(printf "%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n" \
            "### 🔍 CodeScan PR Summary" \
            "" \
            "**Severity Counts**" \
            "- Critical: $CRITICAL" \
            "- High: $HIGH" \
            "- Medium: $MEDIUM" \
            "- Low: $LOW" \
            "" \
            "### Issues" \
            "| File | Line | Severity | Message |" \
            "|------|------|----------|---------|" \
            "$TABLE"
          )

          echo "Posting PR comment..."
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg body "$COMMENT" '{body: $body}')" \
            "https://api.github.com/repos/$OWNER/$REPO/issues/$PR_NUMBER/comments"

      # -------------------------------------------------------
      # Archive SARIF as artifact
      # -------------------------------------------------------
      - name: Archive CodeScan SARIF
        uses: actions/upload-artifact@v4
        with:
          name: codescan.sarif
          path: codescan.sarif
