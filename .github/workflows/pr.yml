name: CodeScan SCA Report

on:
  pull_request:
    branches: [main]

env:
  SONAR_SCANNER_VERSION: 5.0.1.3006

jobs:
  build:
    runs-on: ubuntu-latest
    environment: main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------------
      # FIX: Ensure full git history (prevents "bad object <sha>")
      # -------------------------------------------------------
      - name: Ensure full git history
        run: |
          git fetch --unshallow || true
          git fetch --all --tags

      - name: Cache files
        uses: actions/cache@v4
        with:
          path: |
            ~/.sonar
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # -------------------------------------------------------
      # FULL SCAN ON PUSH
      # -------------------------------------------------------
      - name: Run CodeScan on Push
        if: github.event_name == 'push'
        uses: codescan-io/codescan-scanner-action@2.0
        with:
          organization: ${{ secrets.CODESCAN_ORG }}
          projectKey:   ${{ secrets.CODESCAN_PROJECT_KEY }}
          codeScanUrl:  ${{ secrets.CODESCAN_URL }}
          login:        ${{ secrets.CODESCAN_TOKEN }}
          generateSarifFile: true
          failOnRedQualityGate: false

      # -------------------------------------------------------
      # PR SCAN (CHANGED FILES ONLY)
      # -------------------------------------------------------
      - name: Run CodeScan on PR
        if: github.event_name == 'pull_request'
        uses: codescan-io/codescan-scanner-action@2.0
        with:
          organization: ${{ secrets.CODESCAN_ORG }}
          projectKey:   ${{ secrets.CODESCAN_PROJECT_KEY }}
          codeScanUrl:  ${{ secrets.CODESCAN_URL }}
          login:        ${{ secrets.CODESCAN_TOKEN }}
          scanChangedFilesOnly: true
          generateSarifFile: true
          failOnRedQualityGate: false
          args: |
            sonar.pullrequest.branch=${{ github.head_ref }}
            sonar.pullrequest.base=${{ github.base_ref }}
            sonar.pullrequest.key=${{ github.event.number }}

      # -------------------------------------------------------
      # Upload SARIF to GitHub Security Tab - Disabled for now
      # -------------------------------------------------------
      #- name: Upload SARIF file
      #  uses: github/codeql-action/upload-sarif@v3
      #  with:
      #    sarif_file: codescan.sarif

      # -------------------------------------------------------
      # PR COMMENT SUMMARY (Filename + Line + Severity + Message)
      # -------------------------------------------------------
      - name: Comment on PR with CodeScan Summary
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
        run: |
          echo "Parsing SARIF..."

          # -------------------------------------------------------
          # NORMALIZE RESULTS INTO AN ARRAY WITH CORRECT SEVERITY + TYPE
          # -------------------------------------------------------
          NORMALIZED=$(jq '
            .runs[0] as $run
            | [
                $run.results[]
                | . as $r
                | ($run.tool.driver.rules[] | select(.id == $r.ruleId)) as $rule

                # Extract issue type from help.text: "[Type: Code Smell, Severity: Major]"
                | ($rule.help.text
                    | capture("Type: (?<t>[^,]+)")
                    | .t
                    | ascii_downcase
                    | gsub(" "; "_")
                  ) as $type

                # Map SARIF rule severity → CRITICAL / MAJOR / MINOR / INFO
                | (
                    if $rule.defaultConfiguration.level == "error" then "CRITICAL"
                    elif $rule.defaultConfiguration.level == "warning" then "MAJOR"
                    elif $rule.defaultConfiguration.level == "note" then "MINOR"
                    else "INFO" end
                  ) as $sev

                | {
                    file: ($r.locations[0].physicalLocation.artifactLocation.uri | split("/") | last),
                    line: $r.locations[0].physicalLocation.region.startLine,
                    severity: $sev,
                    type: $type,
                    msg: ($r.message.text | gsub("\n"; " "))
                  }
              ]
          ' codescan.sarif)

          # -------------------------------------------------------
          # CORRECT SEVERITY COUNTS (SINGLE NUMBERS)
          # -------------------------------------------------------
          CRITICAL=$(echo "$NORMALIZED" | jq 'map(select(.severity=="CRITICAL")) | length')
          MAJOR=$(echo "$NORMALIZED"    | jq 'map(select(.severity=="MAJOR"))    | length')
          MINOR=$(echo "$NORMALIZED"    | jq 'map(select(.severity=="MINOR"))    | length')
          INFO=$(echo "$NORMALIZED"     | jq 'map(select(.severity=="INFO"))     | length')

          # -------------------------------------------------------
          # SORT ISSUES BY FILE NAME, THEN LINE NUMBER
          # -------------------------------------------------------
          SORTED=$(echo "$NORMALIZED" | jq 'sort_by(.file, .line)')

          # -------------------------------------------------------
          # BUILD TABLE (NOW WITH TYPE COLUMN)
          # -------------------------------------------------------
          TABLE=$(echo "$SORTED" | jq -r '
            .[] |
            "| \(.file) | \(.line) | \(.severity) | \(.type) | \(.msg) |"
          ')

          COMMENT=$(printf "%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n%s\n" \
            "### 🔍 CodeScan PR Summary" \
            "" \
            "**Severity Counts**" \
            "- Critical: $CRITICAL" \
            "- Major: $MAJOR" \
            "- Minor: $MINOR" \
            "- Info: $INFO" \
            "" \
            "### Issues" \
            "| File | Line | Severity | Type | Message |" \
            "|------|------|----------|------|---------|" \
            "$TABLE"
          )

          echo "Posting PR comment..."
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg body "$COMMENT" '{body: $body}')" \
            "https://api.github.com/repos/$OWNER/$REPO/issues/$PR_NUMBER/comments"

      # -------------------------------------------------------
      # Archive SARIF as artifact
      # -------------------------------------------------------
      - name: Archive CodeScan SARIF
        uses: actions/upload-artifact@v4
        with:
          name: codescan.sarif
          path: codescan.sarif
